{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
	<div class="container">
		<div class="row">
			<div class="col-lg-8" style="margin-top: 3.1rem!important;">
				<div class="content-section">
						<fieldset class="form-group">
							<legend class="border-bottom mb-4">Password Changed</legend>
							<h4>Your account password has been changed successfully.</h4>
							<p id="redirectPage"></p>
						</fieldset>
				</div>
			</div>
			{% include 'blog/sidebar.html' %}
		</div>
	</div>
	<script>
		var seconds = 6;
		function displayseconds()
		{
			seconds = seconds - 1;
			document.getElementById('redirectPage').innerText="You'll be redirect to your profile in "+seconds+ ' second(s)...';
		}
		setInterval(displayseconds, 1000);
		setTimeout(function() {
			window.location.href = "{% url 'home' %}";
		}, 6000);
	</script>
{% endblock content %}
