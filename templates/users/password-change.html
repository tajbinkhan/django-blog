{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
	<div class="container">
		<div class="row">
			<div class="col-lg-8" style="margin-top: 3.1rem!important;">
				<div class="content-section">
					<form method="POST">
						{% csrf_token %}
						<fieldset class="form-group">
							<legend class="border-bottom mb-4">Change Password</legend>
							{{ form|crispy }}
						</fieldset>
						<div class="form-group">
							<button class="btn btn-outline-info" type="submit">Change Password</button>
						</div>
					</form>
				</div>
			</div>
			{% include 'blog/sidebar.html' %}
		</div>
	</div>
	<script>
		var ul_fields = document.getElementsByTagName('ul')
			for (var field in ul_fields){ 
			ul_fields[field].className += ' ul-list-class';
		}
		document.getElementsByName('old_password')[0].placeholder='Enter your old password';
		document.getElementsByName('new_password1')[0].placeholder='Enter your new password';
		document.getElementsByName('new_password2')[0].placeholder='Confirm your new password';
	</script>
{% endblock content %}
